spring.application.name=webapi

# Tomcat by default spins up 200 threads ready to handle requests
# you only need 1 thread for an interviewer testing with curl
# this caps it at 10 so it doesn't waste memory on idle threads
server.tomcat.threads.max=10

# Tomcat keeps a minimum number of threads alive even when idle
# default is 10, dropping to 2 means only 2 threads sitting idle
# waiting for requests instead of 10
server.tomcat.threads.min-spare=2

# Spring Boot prints an ASCII art "Spring" banner on startup
# purely cosmetic, turning it off is one less thing to load
spring.main.banner-mode=off